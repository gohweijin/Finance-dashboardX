  return{v:SCHEMA,expenses:SEED.map(s=>Object.assign({},s)),income:JSON.parse(JSON.stringify(DINC)),
    assets:[{id:'a1',name:'HDB flat (Ubi Ave 1)',value:348530.13}],
    liabilities:[{id:'l1',name:'HDB loan',value:348530.13},{id:'l2',name:'Car loan',value:39600}],
    cpf:Object.assign({},DCPF),settled:{}};
}
function initState(){
  // Try to load saved state — only accept if it has enough transactions (>50)
  // so a blank/corrupt localStorage doesn't override the seed
  for(const k of['sg_finance_v1','sg11_state']){
    try{
      const r=localStorage.getItem(k);if(!r)continue;
      const d=JSON.parse(r);
      if(d&&d.expenses&&d.expenses.length>50){
        // Merge any seed txns missing from saved state, and fix stmt dates/holder/behalf
        const ids=new Set(d.expenses.map(e=>e.id));
        SEED.forEach(s=>{
          if(!ids.has(s.id)){d.expenses.push(Object.assign({},s));}
          else{const e=d.expenses.find(x=>x.id===s.id);if(e){e.sd=s.sd;e.h=s.h;e.b=s.b;}}
        });
        // Deduplicate by id — keeps first occurrence
        const seen=new Set();
        d.expenses=d.expenses.filter(e=>{if(seen.has(e.id))return false;seen.add(e.id);return true;});
        if(!d.settled)d.settled={};
        if(!d.assets||!d.assets.length)d.assets=[{id:'a1',name:'HDB flat (Ubi Ave 1)',value:348530.13}];
        if(!d.liabilities||!d.liabilities.length)d.liabilities=[{id:'l1',name:'HDB loan',value:348530.13},{id:'l2',name:'Car loan',value:39600}];
        if(!d.cpf)d.cpf=Object.assign({},DCPF);
        if(!d.income)d.income={};
        Object.entries(DINC).forEach(([m,v])=>{if(!d.income[m])d.income[m]=Object.assign({},v);});
        d.v=SCHEMA;
        return d;
      }
    }catch(e){}
  }
  // No valid saved state — build from seed
  return buildFresh();
}

function save(){try{localStorage.setItem('sg_finance_v1',JSON.stringify(S));}catch(e){}}
function mexp(){return S.expenses.filter(e=>em(e)===cur);}
function calcSettle(exps){
  const wc=exps.filter(e=>gh(e)==='w'),hc=exps.filter(e=>gh(e)==='h');
  const wh=wc.filter(e=>e.who==='him'&&ga(e)>0),wj=wc.filter(e=>e.who==='joint'&&ga(e)>0);
  const hj=hc.filter(e=>e.who==='joint'&&ga(e)>0),hm=hc.filter(e=>e.who==='me'&&ga(e)>0);
  const sum=a=>a.reduce((s,e)=>s+ga(e),0);
  const how=sum(wh)+sum(wj)*.5,woh=sum(hj)*.5+sum(hm);
  return{wh,wh_a:sum(wh),wj,wj_a:sum(wj)*.5,how,hj,hj_a:sum(hj)*.5,hm,hm_a:sum(hm),woh,net:how-woh,
    sis:exps.reduce((s,e)=>s+(parseFloat(e.ss)||0),0),sisx:exps.filter(e=>parseFloat(e.ss)>0)};
}

}

function rLR(){
  const exps=S.expenses.filter(e=>{
    if(LF.mo&&em(e)!==LF.mo)return false;
    if(LF.h&&gh(e)!==LF.h)return false;
    if(LF.bk&&(e.bk||'')!==LF.bk)return false;
    if(LF.w&&e.who!==LF.w)return false;
    if(LF.c&&e.cat!==LF.c)return false;
    if(LF.b==='no'&&!isO(e))return false;
    if(LF.b&&LF.b!=='no'&&e.b!==LF.b)return false;
    if(LF.s&&!(e.desc||'').toLowerCase().includes(LF.s.toLowerCase()))return false;
    return true;
  }).sort((a,b)=>(b.td||'').localeCompare(a.td||''));
  const tot=exps.reduce((s,e)=>s+ga(e),0);
  const lc=document.getElementById('lc'),lt=document.getElementById('lt');
  if(lc)lc.textContent=exps.length+' txns';
  if(lt)lt.textContent=fd(tot);
  const rows=document.getElementById('lrows');
  if(!rows)return;
  if(!exps.length){rows.innerHTML='<div class="empty">No transactions match.</div>';return;}
  rows.innerHTML=exps.map(e=>{
    const c=gc(e.cat),d=gdow(e.td);
    const ds=d===0?'color:#c0392b;font-weight:600':d===3?'color:#1a7a4a;font-weight:600':'color:#888';

  <div class="card"><div class="ctitle">Wife's card — He owes you <b>${fd(s.how)}</b></div>
    ${s.wh.length?`<div class="sline"><div>Who=Him × 100% (${s.wh.length} items)</div><div>${fd(s.wh_a)}</div></div>`:''}
    ${s.wj.length?`<div class="sline"><div>Who=Joint × 50% (${s.wj.length} items · total ${fd(s.wj.reduce((a,e)=>a+ga(e),0))})</div><div>${fd(s.wj_a)}</div></div>`:''}
    ${!s.wh.length&&!s.wj.length?'<div class="empty" style="padding:8px 0">No transactions on wife\'s card.</div>':''}
  </div>
  <div class="card"><div class="ctitle">Husband's card — You owe him <b style="color:#c0392b">${fd(s.woh)}</b></div>
    ${s.hj.length?`<div class="sline"><div>Who=Joint × 50% (${s.hj.length} items · total ${fd(s.hj.reduce((a,e)=>a+ga(e),0))})</div><div>${fd(s.hj_a)}</div></div>`:''}
    ${s.hm.length?`<div class="sline"><div>Who=Wife × 100%</div><div>${fd(s.hm_a)}</div></div>`:''}
    ${!s.hj.length&&!s.hm.length?'<div class="empty" style="padding:8px 0">None.</div>':''}
  </div>
  <div class="card" style="background:#f5f5f5"><div class="ctitle">Net settlement ${settled?'<span class="ok">✓ Settled</span>':'<span class="pend">Pending</span>'}</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>${s.net>=0?'Husband pays you':'You pay husband'}</div>
      <div style="font-size:26px;font-weight:700;color:${nc}">${fd(netAbs)}</div>
    </div>
    <div style="font-size:10px;color:#888;margin-top:4px">He owes you ${fd(s.how)} − you owe him ${fd(s.woh)} = net ${fd(netAbs)}</div>
  </div>
  <div class="lbl" style="margin-bottom:8px">WhatsApp message</div>
  <div class="wabox" id="waMsg">${msg}</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    <button class="wa" onclick="window.open('https://wa.me/?text='+encodeURIComponent(document.getElementById('waMsg').textContent),'_blank')">📲 Send</button>
    <button class="btn" onclick="navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('waMsg').textContent).then(()=>alert('Copied!'))">Copy</button>
    <button class="sbtn" style="border:1px solid ${settled?'#fca5a5':'#86efac'};background:${settled?'#fee2e2':'#dcfce7'};color:${settled?'#c0392b':'#15803d'}" onclick="togS()">${settled?'Mark unsettled':'✓ Mark settled'}</button>
  </div>
  <div class="lbl" style="margin-bottom:8px">On-behalf claims</div>
  ${clHTML||'<div style="font-size:11px;color:#888;margin-bottom:16px">No on-behalf claims this month.</div>'}
  <div class="lbl" style="margin-top:16px;margin-bottom:8px">History</div>
  <div class="lbox">
    <div class="lhdr" style="grid-template-columns:1fr 90px 90px 100px 70px"><div>Month</div><div style="text-align:right">Wife card</div><div style="text-align:right">His card</div><div style="text-align:right">Net</div><div style="text-align:right">Status</div></div>
    ${histHTML}
  </div>`;
}
function togS(){S.settled[cur]=!S.settled[cur];save();rSet();}

function rNW(){
  const c=S.cpf||DCPF;
  const cpfT=(c.myOA||0)+(c.mySA||0)+(c.myMA||0)+(c.myCPFIS||0)+(c.hisOA||0)+(c.hisSA||0)+(c.hisMA||0)+(c.hisCPFIS||0);
  const tA=cpfT+(S.assets||[]).reduce((s,a)=>s+(parseFloat(a.value)||0),0);
  const tL=(S.liabilities||[]).reduce((s,l)=>s+(parseFloat(l.value)||0),0);
  const nw=tA-tL,bp=tA>0?Math.max(0,Math.min(Math.round(nw/tA*100),100)):0;
  document.getElementById('nw').innerHTML=`
  <div class="hrow"><div><div class="htitle">Net worth</div><div class="hval">${new Date().toLocaleDateString('en-SG',{day:'numeric',month:'long',year:'numeric'})}</div></div></div>
  <div class="g4">
    <div class="box"><div class="lbl">Total assets</div><div class="val pos">${f0(tA)}</div></div>
    <div class="box"><div class="lbl">Liabilities</div><div class="val neg">${f0(tL)}</div></div>
    <div class="box"><div class="lbl">Net worth</div><div class="val ${nw<0?'neg':'pos'}">${nw<0?'−':''}${f0(Math.abs(nw))}</div></div>
    <div class="box"><div class="lbl">Coverage</div><div class="val">${tL>0?Math.min(Math.round(tA/tL*100),999)+'%':'—'}</div></div>
  </div>
  <div class="nwbar"><div class="nwfill" style="width:${bp}%;background:${nw<0?'#c0392b':'#1a7a4a'}"></div></div>
  <div class="g2" style="margin-bottom:16px">
    <div class="card"><div class="ctitle">Your CPF — ${f0((c.myOA||0)+(c.mySA||0)+(c.myMA||0)+(c.myCPFIS||0))}</div>
    <div class="cpfg">
      <div class="cpff"><label>OA</label><input class="cpfi" type="number" value="${c.myOA||''}" oninput="uCPF('myOA',this.value)"><div class="cpfr">2.5%</div></div>
      <div class="cpff"><label>SA</label><input class="cpfi" type="number" value="${c.mySA||''}" oninput="uCPF('mySA',this.value)"><div class="cpfr">4%</div></div>
      <div class="cpff"><label>MA</label><input class="cpfi" type="number" value="${c.myMA||''}" oninput="uCPF('myMA',this.value)"><div class="cpfr">4%</div></div>
      <div class="cpff"><label>CPFIS</label><input class="cpfi" type="number" value="${c.myCPFIS||''}" oninput="uCPF('myCPFIS',this.value)"></div>
    </div></div>
    <div class="card"><div class="ctitle">Husband's CPF — ${f0((c.hisOA||0)+(c.hisSA||0)+(c.hisMA||0)+(c.hisCPFIS||0))}</div>
    <div class="cpfg">
      <div class="cpff"><label>OA</label><input class="cpfi" type="number" value="${c.hisOA||''}" oninput="uCPF('hisOA',this.value)"><div class="cpfr">2.5%</div></div>
      <div class="cpff"><label>SA</label><input class="cpfi" type="number" value="${c.hisSA||''}" oninput="uCPF('hisSA',this.value)"><div class="cpfr">4%</div></div>
      <div class="cpff"><label>MA</label><input class="cpfi" type="number" value="${c.hisMA||''}" oninput="uCPF('hisMA',this.value)"><div class="cpfr">4%</div></div>
      <div class="cpff"><label>CPFIS</label><input class="cpfi" type="number" value="${c.hisCPFIS||''}" oninput="uCPF('hisCPFIS',this.value)"></div>
    </div></div>
  </div>
  <div class="lbl" style="margin-bottom:8px">Other assets</div>
  <div class="lbox">
    <div class="ahdr"><div>Asset</div><div style="text-align:right">Value S$</div><div></div></div>
    ${(S.assets||[]).map(a=>`<div class="arow"><div>${a.name}</div><div class="ar">${f0(parseFloat(a.value)||0)}</div><div><button class="delbtn" onclick="dlA('${a.id}')">×</button></div></div>`).join('')||'<div class="empty">None.</div>'}
  </div>
  <div class="irow" style="margin-bottom:16px">
    <div class="fld"><label>Name</label><input type="text" id="an" placeholder="e.g. SRS"></div>
    <div class="fld"><label>Value S$</label><input type="number" id="av" placeholder="0"></div>
    <button class="btn" onclick="adA()">+ Add</button>
  </div>
  <div class="lbl" style="margin-bottom:8px">Liabilities</div>
  <div class="lbox">
    <div class="lhdr3"><div>Liability</div><div style="text-align:right">Amount S$</div><div></div></div>
    ${(S.liabilities||[]).map(l=>`<div class="lrow3"><div>${l.name}</div><div class="ar neg">${f0(parseFloat(l.value)||0)}</div><div><button class="delbtn" onclick="dlL('${l.id}')">×</button></div></div>`).join('')||'<div class="empty">None.</div>'}
  </div>
  <div class="irow">
    <div class="fld"><label>Name</label><input type="text" id="ln" placeholder="e.g. HDB loan"></div>
    <div class="fld"><label>Amount S$</label><input type="number" id="lv" placeholder="0"></div>
    <button class="btn" onclick="adL()">+ Add</button>
  </div>`;
}
function uCPF(k,v){if(!S.cpf)S.cpf=Object.assign({},DCPF);S.cpf[k]=parseFloat(v)||0;save();rNW();}
function adA(){const n=document.getElementById('an').value.trim(),v=parseFloat(document.getElementById('av').value);if(!n||isNaN(v))return;S.assets.push({id:Date.now().toString(),name:n,value:v});save();rNW();}
function dlA(id){S.assets=S.assets.filter(a=>a.id!==id);save();rNW();}
function adL(){const n=document.getElementById('ln').value.trim(),v=parseFloat(document.getElementById('lv').value);if(!n||isNaN(v))return;S.liabilities.push({id:Date.now().toString(),name:n,value:v});save();rNW();}
function dlL(id){S.liabilities=S.liabilities.filter(l=>l.id!==id);save();rNW();}

rCF();
</script>
</body>
</html>
